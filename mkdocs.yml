site_name: zxtoolbox
site_description: Windows、Mac、Linux 上常用重复任务工具集合
site_author: smallZh

docs_dir: docs
site_dir: site

theme:
  name: smzhbook

nav:
  - 首页: index.md
  - 文档:
      - zxtool 配置管理: config_manager.md
      - 电脑 OS 和硬件信息: computer_info.md
      - Git 配置管理: git_config.md
      - MkDocs 构建: mkdocs_manager.md
      - Nginx 站点配置: nginx_manager.md
      - Let's Encrypt 证书: letsencrypt.md
      - 飞书 Client: feishu_client.md
      - 自签 SSL 证书: ssl_cert.md
      - EPUB 转 Markdown: epub_manager.md
      - 目录备份拷贝: backup_manager.md
      - 视频下载: video_download.md
      - TOTP 解析: totp.md

plugins:
  - search:
      lang: ["zh", "en"]
      separator: "[\\s\\-\\.]+" 
      min_search_length: 2
      prebuild_index: false
      indexing: full

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/smallzh/zxtoolbox
